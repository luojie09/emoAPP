name: Build Android APK

# 触发条件：当代码推送到 main 分支，或者在 GitHub 网页上手动点击时触发
on:
  push:
    branches: [ "main", "master" ] # 兼容 main 或 master 分支
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 云服务器

    steps:
      - name: 📦 拉取最新代码
        uses: actions/checkout@v4

      - name: 🟢 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 使用稳定的 Node 版本

      - name: ☕ 设置 Java 17 环境 (Android 打包必需)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📥 安装前端依赖
        run: npm install

      - name: 🏗️ 编译前端代码 (注入 App 环境变量)
        # 注意：这里调用的是我们之前配置好的分离打包命令
        run: npm run build:app 

      - name: 🔄 同步代码到安卓工程
        run: npx cap sync android

      - name: 🔨 编译生成 Android APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: 🚀 上传 APK 安装包供下载
        uses: actions/upload-artifact@v4
        with:
          name: shiguang-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
